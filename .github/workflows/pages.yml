name: Deploy demo to GitHub Pages

# Publishes the web/ folder — the live in-browser generation demo (run.c
# compiled to WASM + the trained weights) plus the annotated-code walkthrough
# — to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
    paths: [web/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
